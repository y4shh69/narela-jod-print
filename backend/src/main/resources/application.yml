server:
  port: 8080

spring:
  application:
    name: narela-print-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/narela_print}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 60MB

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
